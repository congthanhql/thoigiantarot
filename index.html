<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>T-Share · Trải Bài Tarot</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;--gold4:#7A5C1E;
  --dark:#0D0B09;--dark2:#1A1612;--dark3:#252018;--dark4:#332C20;
  --dark5:#453C28;
  --t1:#F5EDD4;--t2:#C8B87A;--t3:#8A7A50;
  --r:10px;--rl:14px;
}
html,body{background:#070605;color:var(--t1);font-family:system-ui,sans-serif;min-height:100vh}

.app-stage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
  background:
    radial-gradient(ellipse at 50% -10%, rgba(201,168,76,.08), transparent 60%),
    var(--dark);
}
.shell{
  display:flex;flex-direction:column;
  width:100%;max-width:430px;height:min(860px,calc(100vh - 4rem));
  background:var(--dark);border-radius:26px;overflow:hidden;
  border:1px solid var(--dark5);
  box-shadow:0 30px 60px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(201,168,76,.06);
  position:relative;
}

/* ── LOGIN ── */
.login-shell{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:1.5rem;background:var(--dark);
}
.login-wrap{width:100%;max-width:320px}
.login-logo{text-align:center;margin-bottom:1.75rem}
.logo-circle{
  width:76px;height:76px;border-radius:50%;border:2px solid var(--gold);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:.75rem;overflow:hidden;background:var(--dark2);
}
.logo-circle img{width:100%;height:100%;object-fit:cover}
.logo-circle .fallback{font-size:30px;color:var(--gold);font-weight:700}
.login-logo h1{font-size:21px;font-weight:700;color:var(--gold2);letter-spacing:.04em;margin-bottom:4px}
.login-logo p{font-size:11px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase}
.divider{width:40px;height:2px;background:var(--gold4);margin:.75rem auto 0;border-radius:2px}
.lcard{background:var(--dark2);border:1px solid var(--dark5);border-radius:var(--rl);padding:1.4rem}
.field-label{font-size:11px;font-weight:500;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:block}
.inp-wrap{position:relative}
.inp-wrap input{
  width:100%;height:42px;padding:0 40px 0 14px;
  border:1px solid var(--dark5);border-radius:var(--r);
  background:var(--dark3);color:var(--t1);font-size:14px;outline:none;transition:border-color .15s;
}
.inp-wrap input:focus{border-color:var(--gold)}
.inp-wrap input::placeholder{color:var(--t3)}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--t3);font-size:17px;
  display:flex;align-items:center;
}
.eye-btn:hover{color:var(--gold)}
.btn-login{
  width:100%;height:42px;
  background:linear-gradient(135deg,var(--gold4),var(--gold),var(--gold4));
  border:none;border-radius:var(--r);
  color:#0D0B09;font-size:14px;font-weight:700;cursor:pointer;
  margin-top:1rem;display:flex;align-items:center;justify-content:center;gap:7px;
  letter-spacing:.04em;transition:opacity .15s;
}
.btn-login:hover{opacity:.88}
.err{font-size:12px;color:#F09595;margin-top:7px;text-align:center;min-height:16px}

/* ── APP ── */
#appView{display:none;flex-direction:column;height:100%}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;height:54px;
  background:var(--dark2);border-bottom:1px solid var(--dark5);
  flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:10px}
.logo-img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold)}
.brand-name{font-size:14px;font-weight:600;color:var(--gold2);letter-spacing:.02em}
.brand-sub{font-size:10px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase}
.tb-btn{
  display:flex;align-items:center;gap:5px;
  background:var(--dark3);border:1px solid var(--dark5);border-radius:var(--r);
  padding:5px 10px;cursor:pointer;color:var(--t2);font-size:12px;transition:border-color .15s;
}
.tb-btn:hover{border-color:var(--gold);color:var(--gold)}

.body{flex:1;overflow:hidden;min-height:0;display:flex}
.content{flex:1;overflow-y:auto;padding:1rem 1rem 1.25rem;min-width:0;-webkit-overflow-scrolling:touch}

.toolbar{display:flex;gap:8px;margin-bottom:.75rem}
.toolbar input{
  flex:1;height:36px;padding:0 12px;
  border:1px solid var(--dark5);border-radius:var(--r);
  background:var(--dark3);color:var(--t1);font-size:13px;outline:none;min-width:0;
}
.toolbar input:focus{border-color:var(--gold)}
.toolbar input::placeholder{color:var(--t3)}
.toolbar select{
  height:36px;padding:0 8px;border:1px solid var(--dark5);border-radius:var(--r);
  background:var(--dark3);color:var(--t2);font-size:13px;outline:none;
}

.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.9rem}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3)}
.dot{width:7px;height:7px;border-radius:50%}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.crd{
  background:var(--dark2);border:1px solid var(--dark5);border-radius:var(--rl);
  padding:.8rem .9rem;cursor:pointer;transition:border-color .15s,background .15s;
}
.crd:hover{border-color:var(--gold4);background:var(--dark3)}
.crd:active{border-color:var(--gold);background:var(--dark3)}
.crd-name{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:2px}
.crd-suite{font-size:10px;color:var(--t3);margin-bottom:5px}
.crd-time{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:4px}
.pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;margin-top:6px}
.p-day{background:#0C2040;color:#85B7EB}
.p-wk{background:#0f2010;color:#97C459}
.p-mo{background:#251800;color:#FAC775}
.p-yr{background:#200808;color:#F09595}

.detail{display:none;margin-bottom:.9rem;background:var(--dark3);border:1px solid var(--gold4);border-radius:var(--rl);padding:1rem;border-left:3px solid var(--gold)}
.detail.open{display:block}
.dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.dh-title{font-size:15px;font-weight:500;color:var(--gold2)}
.dh-sub{font-size:11px;color:var(--t3);margin-top:2px}
.close-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--t3);padding:0;display:flex}
.close-btn:hover{color:var(--gold)}
.d-desc{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:.8rem}
.d-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.d-item{background:var(--dark2);border-radius:var(--r);padding:8px 10px;border:1px solid var(--dark5)}
.d-label{font-size:10px;color:var(--t3);margin-bottom:2px;letter-spacing:.05em;text-transform:uppercase}
.d-val{font-size:13px;font-weight:500;color:var(--t1)}
.empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:13px}

/* ── BOTTOM NAV ── */
.bottomnav{
  display:flex;flex-shrink:0;
  background:var(--dark2);border-top:1px solid var(--dark5);
  padding-bottom:env(safe-area-inset-bottom,0);
}
.bntab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:9px 2px 8px;
  cursor:pointer;background:none;border:none;color:var(--t3);font-size:10.5px;
  white-space:nowrap;position:relative;transition:color .15s;
}
.bntab i{font-size:20px}
.bntab.on{color:var(--gold2)}
.bntab.on::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:22px;height:2px;border-radius:2px;background:var(--gold);
}
</style>
</head>
<body>

<div class="app-stage">
<div id="root" class="shell">

<!-- LOGIN -->
<div id="loginView" class="login-shell">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-circle">
        <span class="fallback">T</span>
      </div>
      <h1>T-SHARE</h1>
      <p>Trải Bài Tarot · Thời Gian</p>
      <div class="divider"></div>
    </div>
    <div class="lcard">
      <label class="field-label" for="codeIn">Mã kết nối</label>
      <div class="inp-wrap">
        <input type="password" id="codeIn" placeholder="Nhập mã của bạn..." autocomplete="off"/>
        <button class="eye-btn" onclick="toggleEye()" aria-label="Hiện/ẩn mã">
          <i class="ti ti-eye" id="eyeIc"></i>
        </button>
      </div>
      <div class="err" id="errMsg" role="alert"></div>
      <button class="btn-login" onclick="doLogin()">
        <i class="ti ti-cards"></i> VÀO TRA CỨU
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appView">
  <div class="topbar">
    <div class="brand">
      <div style="width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gold);background:var(--dark2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--gold)">T</div>
      <div>
        <div class="brand-name">T-Share</div>
        <div class="brand-sub">Trải bài · Thời gian</div>
      </div>
    </div>
    <button class="tb-btn" onclick="doLogout()">
      <i class="ti ti-logout"></i><span>Đăng xuất</span>
    </button>
  </div>

  <div class="body">
    <div class="content">
      <div class="detail" id="detail"></div>
      <div class="toolbar">
        <input type="text" id="q" placeholder="Tìm tên lá bài..." oninput="render()"/>
        <select id="flt" onchange="render()">
          <option value="">Tất cả</option>
          <option value="Ngày">Ngày</option>
          <option value="Tuần">Tuần</option>
          <option value="Tháng">Tháng</option>
          <option value="Năm">Năm</option>
        </select>
      </div>
      <div class="legend">
        <div class="leg"><div class="dot" style="background:#85B7EB"></div>Ngày</div>
        <div class="leg"><div class="dot" style="background:#97C459"></div>Tuần</div>
        <div class="leg"><div class="dot" style="background:#FAC775"></div>Tháng</div>
        <div class="leg"><div class="dot" style="background:#F09595"></div>Năm+</div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <nav class="bottomnav" id="bottomNav"></nav>
</div>

</div><!-- .shell -->
</div><!-- .app-stage -->

function pill(r){
  if(r==="Ngày") return '<span class="pill p-day">Ngày</span>';
  if(r==="Tuần") return '<span class="pill p-wk">Tuần</span>';
  if(r==="Tháng") return '<span class="pill p-mo">Tháng</span>';
  return '<span class="pill p-yr">Năm+</span>';
}
function subOf(id){ return TABS.find(t=>t.id===id).sub; }

function render(){
  const q = document.getElementById("q").value.toLowerCase();
  const f = document.getElementById("flt").value;
  const list = DATA[tab].filter(c=>(!q||c.n.toLowerCase().includes(q))&&(!f||c.r===f));
  const g = document.getElementById("grid");
  if(!list.length){
    g.innerHTML='<div class="empty"><i class="ti ti-search" style="font-size:28px;display:block;margin-bottom:8px"></i>Không tìm thấy lá bài phù hợp</div>';
    return;
  }
  g.innerHTML = list.map(c=>`
    <div class="crd" onclick="showDetail(${DATA[tab].indexOf(c)})">
      <div class="crd-name">${c.n}</div>
      <div class="crd-suite">${subOf(tab)}</div>
      <div class="crd-time"><i class="ti ti-clock" style="font-size:12px"></i>${c.t}</div>
      ${pill(c.r)}
    </div>`).join("");
}

function showDetail(i){
  const c = DATA[tab][i];
  const d = document.getElementById("detail");
  d.className = "detail open";
  d.innerHTML = `
    <div class="dh">
      <div><div class="dh-title">${c.n}</div><div class="dh-sub">${subOf(tab)}</div></div>
      <button class="close-btn" onclick="closeD()" aria-label="Đóng"><i class="ti ti-x"></i></button>
    </div>
    <p class="d-desc">${c.d}</p>
    <div class="d-meta">
      <div class="d-item"><div class="d-label">Thời gian</div><div class="d-val">${c.t}</div></div>
      <div class="d-item"><div class="d-label">Phạm vi</div><div class="d-val">${pill(c.r)}</div></div>
      <div class="d-item"><div class="d-label">Nguyên tố</div><div class="d-val">${c.el}</div></div>
      <div class="d-item"><div class="d-label">Mùa</div><div class="d-val">${c.s}</div></div>
    </div>`;
  d.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function closeD(){ document.getElementById("detail").className="detail"; }

function buildNav(){
  document.getElementById("bottomNav").innerHTML = TABS.map(t=>`
    <button class="bntab${t.id===tab?" on":""}" onclick="switchTab('${t.id}')">
      <i class="ti ${t.icon}"></i>${t.label}
    </button>`).join("");
}
function switchTab(id){ tab=id; closeD(); buildNav(); render(); }

function toggleEye(){
  eyeOpen = !eyeOpen;
  document.getElementById("codeIn").type = eyeOpen ? "text" : "password";
  document.getElementById("eyeIc").className = eyeOpen ? "ti ti-eye-off" : "ti ti-eye";
}
function doLogin(){
  const v = document.getElementById("codeIn").value.trim();
  if(CODES.includes(v)){
    document.getElementById("loginView").style.display = "none";
    const av = document.getElementById("appView");
    av.style.display = "flex";
    buildNav(); render();
  } else {
    document.getElementById("errMsg").textContent = "Mã không đúng, vui lòng thử lại.";
  }
}
function doLogout(){
  document.getElementById("loginView").style.display = "flex";
  const av = document.getElementById("appView");
  av.style.display = "none";
  document.getElementById("codeIn").value = "";
  document.getElementById("errMsg").textContent = "";
  eyeOpen = false;
  document.getElementById("codeIn").type = "password";
  document.getElementById("eyeIc").className = "ti ti-eye";
}
document.getElementById("codeIn").addEventListener("keydown", e=>{
  if(e.key==="Enter") doLogin();
});
</script>
